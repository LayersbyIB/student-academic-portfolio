<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Student Academic Portfolio</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/main.js" defer></script>
</head>
<body>
  <header class="site-header">
    <nav class="navbar" aria-label="Main navigation">
      <a class="brand" href="index.html">Ifreke Akpakpan</a>
      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="primary-menu">Menu</button>
      <ul class="nav-links" id="primary-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Me</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="planner.html">Academic Planner</a></li>
        <li><a class="active" href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="page-title">
      <p class="eyebrow">Get in Touch</p>
      <h1>Contact Me</h1>
      <p>Use the form below for academic collaborations, project discussions, or mentoring requests.</p>
    </section>

    <section class="contact-layout">
      <form class="contact-form" id="contact-form" novalidate>
        <div class="form-field">
          <label for="name">Name <span class="required">*</span></label>
          <input id="name" name="name" type="text" autocomplete="name">
        </div>
        <div class="form-field">
          <label for="email">Email Address <span class="required">*</span></label>
          <input id="email" name="email" type="email" autocomplete="email">
        </div>
        <div class="form-field">
          <label for="phone">Phone Number <span class="required">*</span></label>
          <input id="phone" name="phone" type="tel" autocomplete="tel">
        </div>
        <div class="form-field">
          <label for="message">Message <span class="required">*</span></label>
          <textarea id="message" name="message" rows="6"></textarea>
        </div>
        <button class="button primary" type="submit">Send Message</button>
        <p class="form-message" id="contact-message" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Ifreke Akpakpan. Academic portfolio website.</p>
  </footer>
</body>
</html>
